# ═══════════════════════════════════════════════════════════════
# Google Cloud Build — CI/CD Pipeline
# Trigger: Push to main branch or manual
#
# Setup (one-time):
#   gcloud builds triggers create github \
#     --repo-name=kodama.web --repo-owner=YOUR_GITHUB_USER \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --substitutions=_REGION=asia-east1
# ═══════════════════════════════════════════════════════════════

substitutions:
  _REGION: asia-east1
  _REPO: kodama
  _DB_INSTANCE: kodama-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ─── Step 1: Build Backend Image ───
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
      - -f
      - Dockerfile.backend
      - .

  # ─── Step 2: Build Worker Image (parallel with backend) ───
  - id: build-worker
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:latest
      - -f
      - Dockerfile.worker
      - .
    waitFor: ['-']  # Run in parallel with build-backend

  # ─── Step 3: Build Frontend Image (parallel, needs secrets for build args) ───
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$$NEXT_PUBLIC_API_URL \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest \
          -f Dockerfile.frontend .
    secretEnv:
      - NEXT_PUBLIC_API_URL
      - NEXT_PUBLIC_FIREBASE_API_KEY
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - NEXT_PUBLIC_FIREBASE_APP_ID
    waitFor: ['-']  # Run in parallel

  # ─── Step 4: Push All Images ───
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend']
    waitFor: ['build-backend']

  - id: push-worker
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker']
    waitFor: ['build-worker']

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend']
    waitFor: ['build-frontend']

  # ─── Step 5: Deploy Backend to Cloud Run ───
  - id: deploy-backend
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        CONNECTION_NAME=$(gcloud sql instances describe ${_DB_INSTANCE} \
          --format='value(connectionName)' --project=${PROJECT_ID})

        gcloud run deploy kodama-backend \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8000 \
          --cpu=1 --memory=512Mi \
          --min-instances=0 --max-instances=3 \
          --add-cloudsql-instances=$${CONNECTION_NAME} \
          --set-secrets="DATABASE_URL=kodama-database-url:latest,LIVEKIT_URL=kodama-livekit-url:latest,LIVEKIT_API_KEY=kodama-livekit-api-key:latest,LIVEKIT_API_SECRET=kodama-livekit-api-secret:latest,AIHUBMIX_API_KEY=kodama-aihubmix-api-key:latest,DASHSCOPE_API_KEY=kodama-dashscope-api-key:latest,FIREBASE_CREDENTIALS_JSON=kodama-firebase-credentials:latest" \
          --set-env-vars="APP_ENV=production,APP_DEBUG=false,AUTH_PROVIDER=firebase,AIHUBMIX_BASE_URL=https://aihubmix.com/v1" \
          --project=${PROJECT_ID}
    waitFor: ['push-backend']

  # ─── Step 6: Deploy Worker to Cloud Run ───
  - id: deploy-worker
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        CONNECTION_NAME=$(gcloud sql instances describe ${_DB_INSTANCE} \
          --format='value(connectionName)' --project=${PROJECT_ID})

        gcloud run deploy kodama-worker \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --cpu=2 --memory=1Gi \
          --min-instances=1 --max-instances=2 \
          --no-cpu-throttling \
          --add-cloudsql-instances=$${CONNECTION_NAME} \
          --set-secrets="DATABASE_URL=kodama-database-url:latest,LIVEKIT_URL=kodama-livekit-url:latest,LIVEKIT_API_KEY=kodama-livekit-api-key:latest,LIVEKIT_API_SECRET=kodama-livekit-api-secret:latest,AIHUBMIX_API_KEY=kodama-aihubmix-api-key:latest,DASHSCOPE_API_KEY=kodama-dashscope-api-key:latest,FIREBASE_CREDENTIALS_JSON=kodama-firebase-credentials:latest" \
          --set-env-vars="APP_ENV=production,APP_DEBUG=false,AIHUBMIX_BASE_URL=https://aihubmix.com/v1" \
          --project=${PROJECT_ID}
    waitFor: ['push-worker']

  # ─── Step 7: Deploy Frontend to Cloud Run ───
  - id: deploy-frontend
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - kodama-frontend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --cpu=1
      - --memory=256Mi
      - --min-instances=0
      - --max-instances=3
      - --project=${PROJECT_ID}
    waitFor: ['push-frontend']

  # ─── Step 8: Update Backend CORS with Frontend URL ───
  - id: update-cors
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        FRONTEND_URL=$(gcloud run services describe kodama-frontend \
          --region=${_REGION} --format='value(status.url)' --project=${PROJECT_ID})

        BACKEND_URL=$(gcloud run services describe kodama-backend \
          --region=${_REGION} --format='value(status.url)' --project=${PROJECT_ID})

        gcloud run services update kodama-backend \
          --region=${_REGION} \
          --update-env-vars="CORS_ORIGINS=$${FRONTEND_URL},APP_BASE_URL=$${BACKEND_URL}" \
          --project=${PROJECT_ID}

        echo "========================================="
        echo "  Frontend: $${FRONTEND_URL}"
        echo "  Backend:  $${BACKEND_URL}"
        echo "========================================="
    waitFor: ['deploy-backend', 'deploy-frontend']

# ─── Secrets (from Secret Manager) ───
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/kodama-frontend-api-url/versions/latest
      env: NEXT_PUBLIC_API_URL
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-api-key/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-auth-domain/versions/latest
      env: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-project-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-storage-bucket/versions/latest
      env: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-messaging-sender-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/${PROJECT_ID}/secrets/kodama-firebase-app-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_APP_ID

# Push all tagged images
images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/frontend:latest

timeout: 1800s  # 30 min max
