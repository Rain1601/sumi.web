apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kodama-worker
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Worker needs to stay alive — set min=1 to avoid cold starts
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cloudsql-instances: ${PROJECT_ID}:${REGION}:kodama-db
        run.googleapis.com/startup-cpu-boost: "true"
        # Worker is long-running, not request-driven
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 3600
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/kodama/worker:latest
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kodama-database-url
                  key: latest
            - name: LIVEKIT_URL
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-url
                  key: latest
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-api-key
                  key: latest
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-api-secret
                  key: latest
            - name: AIHUBMIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-aihubmix-api-key
                  key: latest
            - name: AIHUBMIX_BASE_URL
              value: https://aihubmix.com/v1
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-dashscope-api-key
                  key: latest
            - name: FIREBASE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: kodama-firebase-credentials
                  key: latest
