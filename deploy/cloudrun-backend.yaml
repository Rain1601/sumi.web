apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kodama-backend
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cloudsql-instances: ${PROJECT_ID}:${REGION}:kodama-db
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/kodama/backend:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kodama-database-url
                  key: latest
            - name: LIVEKIT_URL
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-url
                  key: latest
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-api-key
                  key: latest
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: kodama-livekit-api-secret
                  key: latest
            - name: AIHUBMIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-aihubmix-api-key
                  key: latest
            - name: AIHUBMIX_BASE_URL
              value: https://aihubmix.com/v1
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kodama-dashscope-api-key
                  key: latest
            - name: AUTH_PROVIDER
              value: firebase
            - name: FIREBASE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: kodama-firebase-credentials
                  key: latest
            - name: CORS_ORIGINS
              value: ${FRONTEND_URL}
